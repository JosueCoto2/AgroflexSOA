server:
  port: 8085

spring:
  application:
    name: agroflex-payments-service
  datasource:
    url: jdbc:mysql://localhost:3306/agroflexsoa?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

# Stripe — NUNCA hardcodear las claves reales aquí
# Usar variables de entorno: STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_test_placeholder}
  comision-porcentaje: 3.5

# URLs de servicios (vacío = usa Eureka)
services:
  orders:
    url: ${ORDERS_SERVICE_URL:http://localhost:8084}

# JWT — debe ser idéntico al secret del auth-service y del gateway
jwt:
  secret: ${JWT_SECRET:agroflex_dev_secret_256bits_cambiar_en_prod_agroflex_secret}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 15000  # Stripe puede tardar más que servicios internos
  circuitbreaker:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.agroflex.payments: INFO
    feign: WARN
    com.stripe: WARN
