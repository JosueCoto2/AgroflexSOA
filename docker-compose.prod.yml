# ============================================================
#  AgroFlex SOA — Override de producción (VPS Hostinger)
#  Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#  Este archivo:
#    - Quita el puerto 80 del frontend (lo maneja nginx)
#    - Agrega nginx con SSL (certbot)
#    - Cierra puertos internos de microservicios al exterior
# ============================================================

services:

  # Frontend: ya no expone puerto 80 directamente
  frontend:
    ports: []

  # MySQL: solo accesible dentro de Docker (no exponer al exterior)
  mysql:
    ports: []

  # Eureka: solo interno
  eureka:
    ports: []

  # Gateway: solo interno (nginx hace proxy)
  gateway:
    ports: []

  # ── Nginx reverse proxy con SSL ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: agroflex-nginx
    restart: unless-stopped
    networks:
      - agroflex-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - gateway
