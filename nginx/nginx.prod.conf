# ============================================================
#  AgroFlex — Nginx Producción (VPS Hostinger)
#  Maneja: SSL, frontend React, proxy al API Gateway
# ============================================================

# Redirige HTTP → HTTPS
server {
    listen 80;
    server_name DOMINIO_AQUI;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl;
    server_name DOMINIO_AQUI;

    # Certificados Let's Encrypt (generados por certbot)
    ssl_certificate     /etc/letsencrypt/live/DOMINIO_AQUI/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMINIO_AQUI/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/DOMINIO_AQUI/chain.pem;

    # Seguridad SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Frontend React ──────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API Gateway Spring Cloud ────────────────────────────────────
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / notificaciones en tiempo real
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;

        # Tamaño máximo de cuerpo (subir imágenes de productos)
        client_max_body_size 10M;
    }

    # ── Eureka Dashboard (solo para demo — proteger en producción real) ──
    location /eureka/ {
        proxy_pass http://eureka:8761/;
        proxy_set_header Host $host;
        # ⚠️ Bloquear en producción real con autenticación básica
        # auth_basic "Eureka";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }
}
